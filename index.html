<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Orizon OS</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/boot.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/taskbar.css">

</head>

<body>

    <!-- ==========================
         Boot Screen
    =========================== -->

    <section id="boot-screen">

    <img
        src="assets/logo/orizon-logo.png"
        alt="Orizon OS Logo"
        id="boot-logo"
    >

    <h1>Orizon OS</h1>

    <p id="boot-text">
        Initializing...
    </p>

</section>

    <!-- ==========================
         Desktop
    =========================== -->

    <main id="desktop">

        <!-- Wallpaper -->

        <div id="wallpaper"></div>

        <!-- Desktop Icons -->

        <section id="desktop-icons"></section>

        <!-- Windows -->

        <section id="windows"></section>

    </main>

    <!-- ==========================
         Taskbar
    =========================== -->

    <footer id="taskbar">

    </footer>

    <!-- ==========================
         Core
    =========================== -->

    <script src="core/os.js"></script>

    <script src="core/windowManager.js"></script>

    <!-- ==========================
         JavaScript
    =========================== -->

    <script src="js/boot.js"></script>
    <script src="js/desktop.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/taskbar.js"></script>

</body>

</html>
